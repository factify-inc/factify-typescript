name: Generate SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
on:
  push:
    branches: [main]
    paths:
      - "openapi.json"
      - ".speakeasy/gen.yaml"
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK generation
        type: boolean
        default: false
      set_version:
        description: Override SDK version
        type: string
jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force || false }}
      mode: direct
      set_version: ${{ github.event.inputs.set_version || '' }}
    secrets:
      github_access_token: ${{ secrets.SDK_PUBLISH_GH_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
      npm_token: ${{ secrets.npm_token }}
